<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0d1117" />
            <stop offset="100%" stop-color="#161b22" />
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <!-- Fondo redondeado tipo app -->
    <rect width="512" height="512" rx="120" fill="url(#bg)"/>
    <!-- Borde interior brillante -->
    <rect width="460" height="460" x="26" y="26" rx="100" fill="none" stroke="#333" stroke-width="8"/>
    
    <!-- Letra K estilizada con glow cyan -->
    <path d="M 180 150 L 180 360 M 180 255 L 330 150 M 200 255 L 330 360" 
          stroke="#00a2ff" stroke-width="60" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
          
    <!-- Un pequeño pixel magenta -->
    <circle cx="360" cy="150" r="25" fill="#ff0066" filter="url(#glow)"/>
</svg>
